apiVersion: apps/v1
kind: Deployment
metadata:
  name: lab-1-3-app
  labels:
    app: lab-1-3-app
    demo.redhat.com/name: ocp-troubleshooting-workshop
spec:
  revisionHistoryLimit: 0
  replicas: 1
  selector:
    matchLabels:
      app: lab-1-3-app
  template:
    metadata:
      labels:
        app: lab-1-3-app
    spec:
      containers:
      - name: web
        image: quay.io/redhat-telco-adoption/nginx-unprivileged:latest
        ports:
        - containerPort: 8080
        command: ["/bin/sh", "-c"]
        args:
        - |
          if [ -z "${DATABASE_URL:-}" ]; then
            echo "ERROR: DATABASE_URL is not set" >&2
            exit 1
          fi
          if [ -z "${APP_NAME:-}" ]; then
            echo "ERROR: APP_NAME is not set" >&2
            exit 1
          fi
          mkdir -p /usr/share/nginx/html
          cat > /usr/share/nginx/html/index.html <<EOF
          <!DOCTYPE html><html><body>
          <h1>Welcome to ${APP_NAME}</h1>
          <p>Database: ${DATABASE_URL}</p>
          </body></html>
          EOF
          nginx -g "daemon off;"
        # Note: DATABASE_URL and APP_NAME are intentionally NOT set here
