apiVersion: apps/v1
kind: Deployment
metadata:
  name: lab-5-1-app
  labels:
    app: lab-5-1-app
    demo.redhat.com/name: ocp-troubleshooting-workshop
spec:
  revisionHistoryLimit: 0
  replicas: 1
  selector:
    matchLabels:
      app: lab-5-1-app
  template:
    metadata:
      labels:
        app: lab-5-1-app
    spec:
      containers:
      - name: web
        image: quay.io/redhat-telco-adoption/nginx-unprivileged:latest
        ports:
        - containerPort: 8080
        command: ["/bin/sh", "-c"]
        args:
        - |
          mkdir -p /usr/share/nginx/html
          echo '<html><body><h1>Scheduler Test App</h1></body></html>' > /usr/share/nginx/html/index.html
          nginx -g "daemon off;"
        resources:
          requests:
            cpu: "8"
            memory: "32Gi"
          limits:
            cpu: "8"
            memory: "32Gi"
