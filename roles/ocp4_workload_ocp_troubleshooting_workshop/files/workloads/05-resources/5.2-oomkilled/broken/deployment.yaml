apiVersion: apps/v1
kind: Deployment
metadata:
  name: lab-5-2-app
  labels:
    app: lab-5-2-app
    demo.redhat.com/name: ocp-troubleshooting-workshop
spec:
  revisionHistoryLimit: 0
  replicas: 1
  selector:
    matchLabels:
      app: lab-5-2-app
  template:
    metadata:
      labels:
        app: lab-5-2-app
    spec:
      containers:
      - name: web
        image: quay.io/redhat-telco-adoption/nginx-unprivileged:latest
        ports:
        - containerPort: 8080
        command: ["/bin/sh", "-c"]
        args:
        - |
          echo "Allocating 100MB of memory (kept alive)..."
          # Allocate 100MB and hold it indefinitely — this persists while nginx runs
          python3 -c "
          import time, signal, sys
          data = bytearray(100 * 1024 * 1024)  # 100MB held in memory
          print('Memory allocated, keeping alive...')
          while True:
              time.sleep(60)
          " &
          sleep 1  # Give python3 time to allocate before nginx starts
          mkdir -p /usr/share/nginx/html
          cat > /usr/share/nginx/html/index.html <<EOF
          <!DOCTYPE html><html><body>
          <h1>Application Running</h1>
          <p>Memory usage: ~100MB</p>
          </body></html>
          EOF
          nginx -g "daemon off;"
        resources:
          requests:
            memory: "32Mi"
          limits:
            memory: "32Mi"    # TOO LOW - app needs ~100MB
