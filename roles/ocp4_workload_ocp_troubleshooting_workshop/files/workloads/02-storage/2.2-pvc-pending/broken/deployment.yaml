apiVersion: apps/v1
kind: Deployment
metadata:
  name: lab-2-2-app
  labels:
    app: lab-2-2-app
    demo.redhat.com/name: ocp-troubleshooting-workshop
spec:
  revisionHistoryLimit: 0
  replicas: 1
  selector:
    matchLabels:
      app: lab-2-2-app
  template:
    metadata:
      labels:
        app: lab-2-2-app
    spec:
      containers:
      - name: web
        image: quay.io/redhat-telco-adoption/nginx-unprivileged:latest
        ports:
        - containerPort: 8080
        command: ["/bin/sh", "-c"]
        args:
        - |
          mkdir -p /usr/share/nginx/html /data
          echo "$(date -Iseconds): App started" >> /data/timestamps.log
          echo "<!DOCTYPE html><html><body><h1>Timestamp Logger</h1><pre>$(cat /data/timestamps.log)</pre></body></html>" > /usr/share/nginx/html/index.html
          nginx -g "daemon off;"
        volumeMounts:
        - name: lab-2-2-data
          mountPath: /data
      volumes:
      - name: lab-2-2-data
        persistentVolumeClaim:
          claimName: lab-2-2-data
