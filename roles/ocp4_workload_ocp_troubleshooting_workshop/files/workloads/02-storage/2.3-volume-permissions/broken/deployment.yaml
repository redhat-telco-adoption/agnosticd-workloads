apiVersion: apps/v1
kind: Deployment
metadata:
  name: lab-2-3-app
  labels:
    app: lab-2-3-app
    demo.redhat.com/name: ocp-troubleshooting-workshop
spec:
  revisionHistoryLimit: 0
  replicas: 1
  selector:
    matchLabels:
      app: lab-2-3-app
  template:
    metadata:
      labels:
        app: lab-2-3-app
    spec:
      # securityContext.fsGroup intentionally OMITTED — students add it as the fix
      securityContext:
        runAsUser: 1001  # Non-root UID to guarantee write failure regardless of storage provisioner
      containers:
      - name: web
        image: quay.io/redhat-telco-adoption/nginx-unprivileged:latest
        ports:
        - containerPort: 8080
        command: ["/bin/sh", "-c"]
        args:
        - |
          echo "Starting application..."
          echo "Writing data to /data/output.log"
          echo "$(date -Iseconds): test write" >> /data/output.log || {
            echo "/docker-entrypoint.sh: Permission denied: /data/output.log" >&2
            exit 1
          }
          mkdir -p /usr/share/nginx/html
          echo "<!DOCTYPE html><html><body><h1>Data Written Successfully</h1><pre>$(cat /data/output.log)</pre></body></html>" > /usr/share/nginx/html/index.html
          nginx -g "daemon off;"
        volumeMounts:
        - name: data
          mountPath: /data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: data-volume-2-3
