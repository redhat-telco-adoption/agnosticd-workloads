apiVersion: apps/v1
kind: Deployment
metadata:
  name: lab-2-3-app
  labels:
    app: lab-2-3-app
    demo.redhat.com/name: ocp-troubleshooting-workshop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lab-2-3-app
  template:
    metadata:
      labels:
        app: lab-2-3-app
    spec:
      # securityContext with fsGroup intentionally OMITTED
      containers:
      - name: web
        image: quay.io/redhat-telco-adoption/nginx-unprivileged:latest
        ports:
        - containerPort: 8080
        command: ["/bin/sh", "-c"]
        args:
        - |
          mkdir -p /usr/share/nginx/html
          if echo "$(date -Iseconds): test write" >> /data/test.log 2>/tmp/err.log; then
            echo "<!DOCTYPE html><html><body><h1>Data Written Successfully</h1><pre>$(cat /data/test.log)</pre></body></html>" > /usr/share/nginx/html/index.html
          else
            echo "<!DOCTYPE html><html><body><h1>Error</h1><p>Permission denied writing to /data</p><pre>$(cat /tmp/err.log)</pre></body></html>" > /usr/share/nginx/html/index.html
          fi
          nginx -g "daemon off;"
        volumeMounts:
        - name: data
          mountPath: /data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: data-volume-2-3
