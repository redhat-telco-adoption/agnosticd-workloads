apiVersion: apps/v1
kind: Deployment
metadata:
  name: lab-6-2-app
  labels:
    app: lab-6-2-app
    demo.redhat.com/name: ocp-troubleshooting-workshop
spec:
  revisionHistoryLimit: 0
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: lab-6-2-app
  template:
    metadata:
      labels:
        app: lab-6-2-app
    spec:
      containers:
      - name: web
        image: quay.io/redhat-telco-adoption/nginx-unprivileged:latest
        ports:
        - containerPort: 8080
        command: ["/bin/sh", "-c"]
        args:
        - |
          echo "Simulating slow startup (10s delay)..."
          sleep 10
          mkdir -p /usr/share/nginx/html
          echo '<html><body><h1>Application Ready</h1><p>Health endpoint: /health on port 8080</p></body></html>' > /usr/share/nginx/html/index.html
          nginx -g "daemon off;"
        readinessProbe:
          httpGet:
            path: /healthz        # WRONG: app serves /health, not /healthz
            port: 9090            # WRONG: app listens on 8080, not 9090
          initialDelaySeconds: 15
          periodSeconds: 5
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /healthz        # WRONG path and port — same misconfiguration
            port: 9090
          initialDelaySeconds: 120  # Long delay so liveness doesn't kill pod immediately
          periodSeconds: 30
          failureThreshold: 3
