apiVersion: apps/v1
kind: Deployment
metadata:
  name: lab-4-2-app
  labels:
    app: lab-4-2-app
    demo.redhat.com/name: ocp-troubleshooting-workshop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lab-4-2-app
  template:
    metadata:
      labels:
        app: lab-4-2-app
    spec:
      containers:
      - name: web
        image: quay.io/redhat-telco-adoption/nginx-unprivileged:latest
        ports:
        - containerPort: 8080
        command: ["/bin/sh", "-c"]
        args:
        - |
          mkdir -p /usr/share/nginx/html
          echo '<html><body><h1>Route Test App</h1><p>App is running on port 8080. Check the Route targetPort.</p></body></html>' > /usr/share/nginx/html/index.html
          nginx -g "daemon off;"
