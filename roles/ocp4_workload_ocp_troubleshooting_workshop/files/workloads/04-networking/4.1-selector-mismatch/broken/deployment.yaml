apiVersion: apps/v1
kind: Deployment
metadata:
  name: lab-4-1-app
  labels:
    app: lab-4-1-app
    demo.redhat.com/name: ocp-troubleshooting-workshop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app    # Note hyphen: my-app
    spec:
      containers:
      - name: web
        image: quay.io/redhat-telco-adoption/nginx-unprivileged:latest
        ports:
        - containerPort: 8080
        command: ["/bin/sh", "-c"]
        args:
        - |
          mkdir -p /usr/share/nginx/html
          echo '<html><body><h1>Service Selector Test App</h1><p>Pod is running but service selector may be misconfigured.</p></body></html>' > /usr/share/nginx/html/index.html
          nginx -g "daemon off;"
