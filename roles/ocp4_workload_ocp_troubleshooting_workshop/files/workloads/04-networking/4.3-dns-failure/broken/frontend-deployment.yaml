apiVersion: apps/v1
kind: Deployment
metadata:
  name: lab-4-3-frontend
  labels:
    app: lab-4-3-frontend
    demo.redhat.com/name: ocp-troubleshooting-workshop
spec:
  revisionHistoryLimit: 0
  replicas: 1
  selector:
    matchLabels:
      app: lab-4-3-frontend
  template:
    metadata:
      labels:
        app: lab-4-3-frontend
    spec:
      containers:
      - name: frontend
        image: quay.io/redhat-telco-adoption/nginx-unprivileged:latest
        ports:
        - containerPort: 8080
        command: ["/bin/sh", "-c"]
        args:
        - |
          mkdir -p /usr/share/nginx/html

          # Continuous polling loop — re-probes backend every 5 seconds and
          # rewrites index.html. After the student fixes the egress NetworkPolicy,
          # the page updates within one poll cycle without a pod restart.
          (
            while true; do
              if curl -sf --max-time 3 http://lab-4-3-backend-svc:8080/ \
                   > /tmp/backend-response.json 2>/tmp/curl-err.log; then
                BACKEND_MSG=$(cat /tmp/backend-response.json)
                cat > /usr/share/nginx/html/index.html <<EOF
          <!DOCTYPE html><html><body>
          <h1>Frontend App</h1>
          <h2>Backend Response:</h2>
          <pre>${BACKEND_MSG}</pre>
          </body></html>
          EOF
              else
                cat > /usr/share/nginx/html/index.html <<EOF
          <!DOCTYPE html><html><body>
          <h1>Frontend App</h1>
          <h2>Error: Cannot connect to backend service</h2>
          <p>DNS resolution or network connectivity failed.</p>
          <pre>$(cat /tmp/curl-err.log 2>/dev/null)</pre>
          </body></html>
          EOF
              fi
              sleep 5
            done
          ) &

          nginx -g "daemon off;"
