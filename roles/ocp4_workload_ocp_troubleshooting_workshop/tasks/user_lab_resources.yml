---
# user_lab_resources.yml
# Called per-user with loop_var: user (user.key = username, user.value = user data)
# Creates one namespace per module with RBAC, quota, limitrange, and showroom SA access.

- name: "Create module namespaces for {{ user.key }}"
  kubernetes.core.k8s:
    state: present
    template: namespace-module.yaml.j2
  vars:
    _username: "{{ user.key }}"
    _module: "{{ item.module }}"
  loop: "{{ _ocp4_workload_ocp_troubleshooting_workshop_modules }}"
  loop_control:
    label: "{{ user.key }}-{{ item.module }}"

- name: "Grant module RBAC access for {{ user.key }}"
  kubernetes.core.k8s:
    state: present
    template: rolebinding-module.yaml.j2
  vars:
    _username: "{{ user.key }}"
    _module: "{{ item.module }}"
    _access: "{{ item.access }}"
  loop: "{{ _ocp4_workload_ocp_troubleshooting_workshop_modules }}"
  loop_control:
    label: "{{ user.key }}-{{ item.module }}"

- name: "Grant showroom SA admin access for {{ user.key }}"
  kubernetes.core.k8s:
    state: present
    template: rolebinding-showroom.yaml.j2
  vars:
    _username: "{{ user.key }}"
    _module: "{{ item.module }}"
  loop: "{{ _ocp4_workload_ocp_troubleshooting_workshop_modules }}"
  loop_control:
    label: "{{ user.key }}-{{ item.module }}"

- name: "Apply safety quotas for {{ user.key }}"
  kubernetes.core.k8s:
    state: present
    namespace: "{{ user.key }}-{{ item.module }}"
    src: "{{ role_path }}/files/quotas/safety-quota.yaml"
  loop: "{{ _ocp4_workload_ocp_troubleshooting_workshop_modules }}"
  loop_control:
    label: "{{ user.key }}-{{ item.module }}"

- name: "Apply default LimitRanges for {{ user.key }}"
  kubernetes.core.k8s:
    state: present
    namespace: "{{ user.key }}-{{ item.module }}"
    src: "{{ role_path }}/files/quotas/safety-limitrange.yaml"
  loop: "{{ _ocp4_workload_ocp_troubleshooting_workshop_modules }}"
  loop_control:
    label: "{{ user.key }}-{{ item.module }}"
