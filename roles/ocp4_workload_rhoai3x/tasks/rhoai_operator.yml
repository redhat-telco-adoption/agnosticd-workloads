---
# ---------------------------------------------------------------------------
# RHOAI 3.x Operator installation via OLM
# Channel: fast-3.3 (verify with: oc get packagemanifest rhods-operator
#   -n openshift-marketplace -o jsonpath='{range .status.channels[*]}{.name}{"\n"}{end}')
# The operator auto-creates the redhat-ods-applications namespace.
# ---------------------------------------------------------------------------

- name: Create redhat-ods-operator namespace
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ ocp4_workload_rhoai3x_operator_namespace }}"

- name: Create OperatorGroup for RHOAI Operator
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: operators.coreos.com/v1
      kind: OperatorGroup
      metadata:
        name: rhods-operator
        namespace: "{{ ocp4_workload_rhoai3x_operator_namespace }}"
      spec: {}  # AllNamespaces mode — OwnNamespace/SingleNamespace not supported by RHOAI

- name: Create Subscription for RHOAI Operator
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: operators.coreos.com/v1alpha1
      kind: Subscription
      metadata:
        name: rhods-operator
        namespace: "{{ ocp4_workload_rhoai3x_operator_namespace }}"
      spec:
        channel: "{{ ocp4_workload_rhoai3x_operator_channel }}"
        name: rhods-operator
        source: redhat-operators
        sourceNamespace: openshift-marketplace
        installPlanApproval: Automatic

- name: Wait for RHOAI Subscription to resolve a CSV
  kubernetes.core.k8s_info:
    api_version: operators.coreos.com/v1alpha1
    kind: Subscription
    name: rhods-operator
    namespace: "{{ ocp4_workload_rhoai3x_operator_namespace }}"
  register: _ocp4_workload_rhoai3x_rhoai_sub
  until: >-
    _ocp4_workload_rhoai3x_rhoai_sub.resources | length > 0
    and _ocp4_workload_rhoai3x_rhoai_sub.resources[0].status.currentCSV is defined
  retries: 20
  delay: 10

- name: Store RHOAI Operator CSV name
  ansible.builtin.set_fact:
    _ocp4_workload_rhoai3x_rhoai_csv_name: >-
      {{ _ocp4_workload_rhoai3x_rhoai_sub.resources[0].status.currentCSV }}

- name: Wait for RHOAI Operator CSV to succeed
  kubernetes.core.k8s_info:
    api_version: operators.coreos.com/v1alpha1
    kind: ClusterServiceVersion
    name: "{{ _ocp4_workload_rhoai3x_rhoai_csv_name }}"
    namespace: "{{ ocp4_workload_rhoai3x_operator_namespace }}"
  register: _ocp4_workload_rhoai3x_rhoai_csv
  until: >-
    _ocp4_workload_rhoai3x_rhoai_csv.resources | length > 0
    and _ocp4_workload_rhoai3x_rhoai_csv.resources[0].status.phase | default('') == 'Succeeded'
  retries: "{{ ocp4_workload_rhoai3x_operator_csv_wait_retries }}"
  delay: "{{ ocp4_workload_rhoai3x_operator_csv_wait_delay }}"
