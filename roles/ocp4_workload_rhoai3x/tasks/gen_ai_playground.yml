---
# ---------------------------------------------------------------------------
# Gen AI Studio Playground
# Creates a LlamaStackDistribution backed by the deployed vLLM InferenceService.
# Requires: llamastackoperator: Managed in DSC, genAiStudio: true in
#           OdhDashboardConfig, and the model InferenceService to be Ready.
# ---------------------------------------------------------------------------

- name: Create LlamaStack config ConfigMap
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: llama-stack-config
        namespace: "{{ ocp4_workload_rhoai3x_model_namespace }}"
        labels:
          opendatahub.io/dashboard: "true"
      data:
        config.yaml: |
          # Llama Stack Configuration
          version: "2"
          image_name: rh
          apis:
          - agents
          - datasetio
          - files
          - inference
          - safety
          - scoring
          - tool_runtime
          - vector_io
          providers:
            inference:
            - provider_id: sentence-transformers
              provider_type: inline::sentence-transformers
              config: {}
            - provider_id: vllm-inference-1
              provider_type: remote::vllm
              config:
                api_token: ${env.VLLM_API_TOKEN_1:=fake}
                base_url: http://{{ ocp4_workload_rhoai3x_model_name }}-predictor.{{ ocp4_workload_rhoai3x_model_namespace }}.svc.cluster.local:8080/v1
                max_tokens: ${env.VLLM_MAX_TOKENS:={{ ocp4_workload_rhoai3x_gen_ai_playground_max_tokens }}}
                tls_verify: ${env.VLLM_TLS_VERIFY:=true}
            vector_io:
            - provider_id: milvus
              provider_type: inline::milvus
              config:
                db_path: /opt/app-root/src/.llama/distributions/rh/milvus.db
                persistence:
                  backend: kv_default
                  namespace: vector_io::milvus
            agents:
            - provider_id: meta-reference
              provider_type: inline::meta-reference
              config:
                persistence:
                  agent_state:
                    backend: kv_default
                    namespace: agents
                  responses:
                    backend: sql_default
                    table_name: responses
            eval: []
            files:
            - provider_id: meta-reference-files
              provider_type: inline::localfs
              config:
                metadata_store:
                  backend: sql_default
                  table_name: files_metadata
                storage_dir: /opt/app-root/src/.llama/distributions/rh/files
            datasetio:
            - provider_id: huggingface
              provider_type: remote::huggingface
              config:
                kvstore:
                  backend: kv_default
                  namespace: datasetio::huggingface
            scoring:
            - provider_id: basic
              provider_type: inline::basic
              config: {}
            - provider_id: llm-as-judge
              provider_type: inline::llm-as-judge
              config: {}
            tool_runtime:
            - provider_id: rag-runtime
              provider_type: inline::rag-runtime
              config: {}
            - provider_id: model-context-protocol
              provider_type: remote::model-context-protocol
              config: {}
            safety: []
          metadata_store:
            type: sqlite
            db_path: /opt/app-root/src/.llama/distributions/rh/inference_store.db
          storage:
            backends:
              kv_default:
                db_path: /opt/app-root/src/.llama/distributions/rh/kvstore.db
                type: kv_sqlite
              sql_default:
                db_path: /opt/app-root/src/.llama/distributions/rh/sql_store.db
                type: sql_sqlite
            stores:
              conversations:
                backend: sql_default
                table_name: openai_conversations
              inference:
                backend: sql_default
                table_name: inference_store
              metadata:
                backend: kv_default
                namespace: registry
          vector_stores:
            default_provider_id: milvus
            default_embedding_model:
              provider_id: sentence-transformers
              model_id: ibm-granite/granite-embedding-125m-english
          registered_resources:
            models:
            - provider_id: sentence-transformers
              model_id: sentence-transformers/ibm-granite/granite-embedding-125m-english
              provider_model_id: ibm-granite/granite-embedding-125m-english
              model_type: embedding
              metadata:
                embedding_dimension: 768
            - provider_id: vllm-inference-1
              model_id: "{{ ocp4_workload_rhoai3x_model_name }}"
              model_type: llm
              metadata:
                description: ""
                display_name: "{{ ocp4_workload_rhoai3x_model_display_name }}"
            shields: []
            vector_dbs: []
            datasets: []
            scoring_fns: []
            benchmarks: []
            tool_groups:
            - toolgroup_id: builtin::rag
              provider_id: rag-runtime
          server:
            port: 8321

- name: Create LlamaStackDistribution for Gen AI Playground
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: llamastack.io/v1alpha1
      kind: LlamaStackDistribution
      metadata:
        name: "{{ ocp4_workload_rhoai3x_gen_ai_playground_name }}"
        namespace: "{{ ocp4_workload_rhoai3x_model_namespace }}"
        annotations:
          openshift.io/display-name: "{{ ocp4_workload_rhoai3x_gen_ai_playground_name }}"
        labels:
          opendatahub.io/dashboard: "true"
      spec:
        replicas: 1
        server:
          distribution:
            name: rh-dev
          userConfig:
            configMapName: llama-stack-config
          containerSpec:
            name: llama-stack
            port: 8321
            command:
            - /bin/sh
            - -c
            - llama stack run /etc/llama-stack/config.yaml
            env:
            - name: VLLM_TLS_VERIFY
              value: "false"
            - name: MILVUS_DB_PATH
              value: ~/.llama/milvus.db
            - name: FMS_ORCHESTRATOR_URL
              value: http://localhost
            - name: VLLM_MAX_TOKENS
              value: "{{ ocp4_workload_rhoai3x_gen_ai_playground_max_tokens }}"
            - name: VLLM_API_TOKEN_1
              value: fake
            - name: LLAMA_STACK_CONFIG_DIR
              value: /opt/app-root/src/.llama/distributions/rh/
            resources:
              requests:
                cpu: 250m
                memory: 500Mi
              limits:
                cpu: "2"
                memory: 12Gi

- name: Wait for LlamaStackDistribution to be Ready
  kubernetes.core.k8s_info:
    api_version: llamastack.io/v1alpha1
    kind: LlamaStackDistribution
    name: "{{ ocp4_workload_rhoai3x_gen_ai_playground_name }}"
    namespace: "{{ ocp4_workload_rhoai3x_model_namespace }}"
  register: _ocp4_workload_rhoai3x_lsd_status
  until: >-
    _ocp4_workload_rhoai3x_lsd_status.resources | length > 0
    and _ocp4_workload_rhoai3x_lsd_status.resources[0].status.phase | default('') == 'Ready'
  retries: "{{ ocp4_workload_rhoai3x_gen_ai_playground_wait_retries }}"
  delay: "{{ ocp4_workload_rhoai3x_gen_ai_playground_wait_delay }}"
