---
# ---------------------------------------------------------------------------
# DataScienceCluster CR (DSC v2 — datasciencecluster.opendatahub.io/v2)
# Enables: Dashboard, Workbenches, KServe (RawDeployment/Headless),
#          AI Pipelines (aipipelines), LlamaStack Operator.
# Requires: RHOAI Operator CSV Succeeded (rhoai_operator.yml).
#
# v2 field changes from v1:
#   datasciencepipelines → aipipelines
#   kserve.serving       → kserve.modelsAsService
#   kserve.defaultDeploymentMode: RawDeployment → kserve.rawDeploymentServiceConfig: Headless
# ---------------------------------------------------------------------------

- name: Wait for DataScienceCluster CRD to be established
  kubernetes.core.k8s_info:
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: datascienceclusters.datasciencecluster.opendatahub.io
  register: _ocp4_workload_rhoai3x_dsc_crd
  until: >-
    _ocp4_workload_rhoai3x_dsc_crd.resources | length > 0
    and (_ocp4_workload_rhoai3x_dsc_crd.resources[0].status.conditions
         | selectattr('type', 'equalto', 'Established')
         | selectattr('status', 'equalto', 'True')
         | list | length) > 0
  retries: 20
  delay: 10

- name: Apply DataScienceCluster CR
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: datasciencecluster.opendatahub.io/v2
      kind: DataScienceCluster
      metadata:
        name: "{{ ocp4_workload_rhoai3x_dsc_name }}"
      spec:
        components:
          dashboard:
            managementState: Managed
          workbenches:
            managementState: Managed
          aipipelines:
            managementState: Managed
          kserve:
            managementState: Managed
            modelsAsService:
              managementState: "{{ ocp4_workload_rhoai3x_kserve_models_as_service_management_state }}"
            rawDeploymentServiceConfig: "{{ ocp4_workload_rhoai3x_kserve_raw_deployment_service_config }}"
          llamastackoperator:
            managementState: Managed
          ray:
            managementState: Removed
          trainingoperator:
            managementState: Removed

- name: Enable Gen AI Studio feature flag in OdhDashboardConfig
  when: ocp4_workload_rhoai3x_gen_ai_studio_enable | bool
  kubernetes.core.k8s:
    state: patched
    api_version: opendatahub.io/v1alpha
    kind: OdhDashboardConfig
    name: odh-dashboard-config
    namespace: redhat-ods-applications
    definition:
      spec:
        dashboardConfig:
          genAiStudio: true

- name: Restart RHOAI dashboard to pick up genAiStudio flag
  when: ocp4_workload_rhoai3x_gen_ai_studio_enable | bool
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: rhods-dashboard
        namespace: redhat-ods-applications
        annotations:
          kubectl.kubernetes.io/restartedAt: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}"

- name: Wait for DataScienceCluster to reach Ready phase
  kubernetes.core.k8s_info:
    api_version: datasciencecluster.opendatahub.io/v2
    kind: DataScienceCluster
    name: "{{ ocp4_workload_rhoai3x_dsc_name }}"
  register: _ocp4_workload_rhoai3x_dsc_status
  until: >-
    _ocp4_workload_rhoai3x_dsc_status.resources | length > 0
    and _ocp4_workload_rhoai3x_dsc_status.resources[0].status.phase | default('') == 'Ready'
  retries: "{{ ocp4_workload_rhoai3x_dsc_wait_retries }}"
  delay: "{{ ocp4_workload_rhoai3x_dsc_wait_delay }}"
