---
# ---------------------------------------------------------------------------
# Deprovision — reverse order of workload.yml
# ---------------------------------------------------------------------------

# 0. Gen AI Playground (LlamaStackDistribution + ConfigMap)
- name: Remove LlamaStackDistribution
  when:
  - ocp4_workload_rhoai3x_gen_ai_studio_enable | bool
  - ocp4_workload_rhoai3x_model_deploy | bool
  kubernetes.core.k8s:
    state: absent
    api_version: llamastack.io/v1alpha1
    kind: LlamaStackDistribution
    name: "{{ ocp4_workload_rhoai3x_gen_ai_playground_name }}"
    namespace: "{{ ocp4_workload_rhoai3x_model_namespace }}"

# 1. MLflow instance
- name: Remove MLflow instance
  when: ocp4_workload_rhoai3x_mlflow_deploy | bool
  kubernetes.core.k8s:
    state: absent
    api_version: mlflow.opendatahub.io/v1
    kind: MLflow
    name: "{{ ocp4_workload_rhoai3x_mlflow_name }}"
    namespace: redhat-ods-applications

# 2. InferenceService and ServingRuntime
- name: Remove InferenceService
  when: ocp4_workload_rhoai3x_model_deploy | bool
  kubernetes.core.k8s:
    state: absent
    api_version: serving.kserve.io/v1beta1
    kind: InferenceService
    name: "{{ ocp4_workload_rhoai3x_model_name }}"
    namespace: "{{ ocp4_workload_rhoai3x_model_namespace }}"

- name: Remove ServingRuntime
  when: ocp4_workload_rhoai3x_model_deploy | bool
  kubernetes.core.k8s:
    state: absent
    api_version: serving.kserve.io/v1alpha1
    kind: ServingRuntime
    name: "{{ ocp4_workload_rhoai3x_model_serving_runtime_name }}"
    namespace: "{{ ocp4_workload_rhoai3x_model_namespace }}"

# 3. DataSciencePipelineApplication
- name: Remove DataSciencePipelineApplication
  when: ocp4_workload_rhoai3x_pipeline_app_configure | bool
  kubernetes.core.k8s:
    state: absent
    api_version: datasciencepipelinesapplications.opendatahub.io/v1
    kind: DataSciencePipelinesApplication
    name: pipelines-definition
    namespace: "{{ ocp4_workload_rhoai3x_pipeline_app_project }}"

- name: Remove MinIO credentials Secret
  when: ocp4_workload_rhoai3x_pipeline_app_configure | bool
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: Secret
    name: rhoai-pipeline-minio-secret
    namespace: "{{ ocp4_workload_rhoai3x_pipeline_app_project }}"

- name: Remove pipeline project namespace
  when: ocp4_workload_rhoai3x_pipeline_app_configure | bool
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: Namespace
    name: "{{ ocp4_workload_rhoai3x_pipeline_app_project }}"

# 4. DataScienceCluster
- name: Remove DataScienceCluster CR
  kubernetes.core.k8s:
    state: absent
    api_version: datasciencecluster.opendatahub.io/v2
    kind: DataScienceCluster
    name: "{{ ocp4_workload_rhoai3x_dsc_name }}"

- name: Wait for DataScienceCluster to be deleted
  kubernetes.core.k8s_info:
    api_version: datasciencecluster.opendatahub.io/v2
    kind: DataScienceCluster
    name: "{{ ocp4_workload_rhoai3x_dsc_name }}"
  register: _ocp4_workload_rhoai3x_dsc_deleted
  until: _ocp4_workload_rhoai3x_dsc_deleted.resources | length == 0
  retries: 20
  delay: 15

# 5. RHOAI Operator
- name: Remove RHOAI Subscription
  kubernetes.core.k8s:
    state: absent
    api_version: operators.coreos.com/v1alpha1
    kind: Subscription
    name: rhods-operator
    namespace: "{{ ocp4_workload_rhoai3x_operator_namespace }}"

- name: Get RHOAI CSV name for removal
  kubernetes.core.k8s_info:
    api_version: operators.coreos.com/v1alpha1
    kind: ClusterServiceVersion
    namespace: "{{ ocp4_workload_rhoai3x_operator_namespace }}"
  register: _ocp4_workload_rhoai3x_rhoai_csvs

- name: Remove RHOAI ClusterServiceVersion(s)
  kubernetes.core.k8s:
    state: absent
    api_version: operators.coreos.com/v1alpha1
    kind: ClusterServiceVersion
    name: "{{ item.metadata.name }}"
    namespace: "{{ ocp4_workload_rhoai3x_operator_namespace }}"
  loop: "{{ _ocp4_workload_rhoai3x_rhoai_csvs.resources }}"

- name: Remove RHOAI OperatorGroup
  kubernetes.core.k8s:
    state: absent
    api_version: operators.coreos.com/v1
    kind: OperatorGroup
    name: rhods-operator
    namespace: "{{ ocp4_workload_rhoai3x_operator_namespace }}"

- name: Remove redhat-ods-operator namespace
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: Namespace
    name: "{{ ocp4_workload_rhoai3x_operator_namespace }}"

- name: Remove redhat-ods-applications namespace (auto-created by RHOAI operator)
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: Namespace
    name: redhat-ods-applications

- name: Remove rhods-notebooks namespace (auto-created by RHOAI operator)
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: Namespace
    name: rhods-notebooks

- name: Remove redhat-ods-monitoring namespace (auto-created by RHOAI operator)
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: Namespace
    name: redhat-ods-monitoring

# 6. NVIDIA GPU Operator
- name: Remove NVIDIA GPU Operator resources
  when: ocp4_workload_rhoai3x_nvidia_gpu_operator_install | bool
  block:
  - name: Remove ClusterPolicy
    kubernetes.core.k8s:
      state: absent
      api_version: nvidia.com/v1
      kind: ClusterPolicy
      name: gpu-cluster-policy

  - name: Wait for ClusterPolicy to be deleted
    kubernetes.core.k8s_info:
      api_version: nvidia.com/v1
      kind: ClusterPolicy
      name: gpu-cluster-policy
    register: _ocp4_workload_rhoai3x_cluster_policy_deleted
    until: _ocp4_workload_rhoai3x_cluster_policy_deleted.resources | length == 0
    retries: 20
    delay: 15

  - name: Remove NVIDIA GPU Operator Subscription
    kubernetes.core.k8s:
      state: absent
      api_version: operators.coreos.com/v1alpha1
      kind: Subscription
      name: gpu-operator-certified
      namespace: "{{ ocp4_workload_rhoai3x_nvidia_gpu_operator_namespace }}"

  - name: Get NVIDIA GPU Operator CSV name for removal
    kubernetes.core.k8s_info:
      api_version: operators.coreos.com/v1alpha1
      kind: ClusterServiceVersion
      namespace: "{{ ocp4_workload_rhoai3x_nvidia_gpu_operator_namespace }}"
    register: _ocp4_workload_rhoai3x_nvidia_csvs

  - name: Remove NVIDIA GPU Operator ClusterServiceVersion(s)
    kubernetes.core.k8s:
      state: absent
      api_version: operators.coreos.com/v1alpha1
      kind: ClusterServiceVersion
      name: "{{ item.metadata.name }}"
      namespace: "{{ ocp4_workload_rhoai3x_nvidia_gpu_operator_namespace }}"
    loop: "{{ _ocp4_workload_rhoai3x_nvidia_csvs.resources }}"

  - name: Remove NVIDIA GPU Operator OperatorGroup
    kubernetes.core.k8s:
      state: absent
      api_version: operators.coreos.com/v1
      kind: OperatorGroup
      name: nvidia-gpu-operator-group
      namespace: "{{ ocp4_workload_rhoai3x_nvidia_gpu_operator_namespace }}"

  - name: Remove nvidia-gpu-operator namespace
    kubernetes.core.k8s:
      state: absent
      api_version: v1
      kind: Namespace
      name: "{{ ocp4_workload_rhoai3x_nvidia_gpu_operator_namespace }}"

# 7. NodeFeatureDiscovery instance and operator
# ocp4_workload_nfd remove_workload is a no-op upstream, so we own full NFD cleanup here
- name: Remove NodeFeatureDiscovery instance
  when: ocp4_workload_rhoai3x_nvidia_gpu_operator_install | bool
  kubernetes.core.k8s:
    state: absent
    api_version: nfd.openshift.io/v1
    kind: NodeFeatureDiscovery
    name: "{{ ocp4_workload_rhoai3x_nfd_instance_name }}"
    namespace: "{{ ocp4_workload_rhoai3x_nfd_namespace }}"

- name: Wait for NodeFeatureDiscovery instance to be deleted
  when: ocp4_workload_rhoai3x_nvidia_gpu_operator_install | bool
  kubernetes.core.k8s_info:
    api_version: nfd.openshift.io/v1
    kind: NodeFeatureDiscovery
    name: "{{ ocp4_workload_rhoai3x_nfd_instance_name }}"
    namespace: "{{ ocp4_workload_rhoai3x_nfd_namespace }}"
  register: _ocp4_workload_rhoai3x_nfd_deleted
  until: _ocp4_workload_rhoai3x_nfd_deleted.resources | length == 0
  retries: 20
  delay: 15

- name: Remove NFD operator namespace (cascades Subscription, CSV, OperatorGroup)
  when: ocp4_workload_rhoai3x_nvidia_gpu_operator_install | bool
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: Namespace
    name: "{{ ocp4_workload_rhoai3x_nfd_namespace }}"

# 8. GPU MachineSet — scale to 0 first, then delete
- name: Remove GPU MachineSet
  when: ocp4_workload_rhoai3x_nvidia_gpu_operator_install | bool
  block:
  - name: Get all MachineSets to find GPU MachineSet by name suffix
    kubernetes.core.k8s_info:
      api_version: machine.openshift.io/v1beta1
      kind: MachineSet
      namespace: openshift-machine-api
    register: _ocp4_workload_rhoai3x_gpu_ms_all

  - name: Filter GPU MachineSets by name suffix
    ansible.builtin.set_fact:
      _ocp4_workload_rhoai3x_gpu_ms_list:
        resources: >-
          {{ _ocp4_workload_rhoai3x_gpu_ms_all.resources |
             selectattr('metadata.name', 'search', ocp4_workload_rhoai3x_gpu_machineset_name_suffix) | list }}

  - name: Scale GPU MachineSet to 0 replicas
    kubernetes.core.k8s:
      state: present
      definition:
        apiVersion: machine.openshift.io/v1beta1
        kind: MachineSet
        metadata:
          name: "{{ item.metadata.name }}"
          namespace: openshift-machine-api
        spec:
          replicas: 0
    loop: "{{ _ocp4_workload_rhoai3x_gpu_ms_list.resources }}"

  - name: Wait for GPU MachineSet replicas to reach 0
    kubernetes.core.k8s_info:
      api_version: machine.openshift.io/v1beta1
      kind: MachineSet
      name: "{{ item.metadata.name }}"
      namespace: openshift-machine-api
    register: _ocp4_workload_rhoai3x_gpu_ms_scaled
    until: >-
      _ocp4_workload_rhoai3x_gpu_ms_scaled.resources | length == 0
      or (_ocp4_workload_rhoai3x_gpu_ms_scaled.resources[0].status.replicas | default(0) | int) == 0
    retries: 20
    delay: 30
    loop: "{{ _ocp4_workload_rhoai3x_gpu_ms_list.resources }}"

  - name: Delete GPU MachineSet
    kubernetes.core.k8s:
      state: absent
      api_version: machine.openshift.io/v1beta1
      kind: MachineSet
      name: "{{ item.metadata.name }}"
      namespace: openshift-machine-api
    loop: "{{ _ocp4_workload_rhoai3x_gpu_ms_list.resources }}"

