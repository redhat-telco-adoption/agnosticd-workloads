---
- name: Run pre-workload tasks
  ansible.builtin.include_tasks: pre_workload.yml

- name: Install Streams for Apache Kafka operator
  ansible.builtin.include_role:
    name: install_operator
  vars:
    install_operator_action: install
    install_operator_name: "{{ ocp4_workload_aiops_operator_name }}"
    install_operator_namespace: "{{ _ocp4_workload_aiops_kafka_namespace }}"
    install_operator_catalog: "{{ ocp4_workload_aiops_operator_catalog }}"
    install_operator_channel: "{{ ocp4_workload_aiops_operator_channel }}"
    install_operator_automatic_install_plan_approval: "{{ ocp4_workload_aiops_operator_automatic_install_plan_approval }}"
    install_operator_starting_csv: "{{ ocp4_workload_aiops_operator_starting_csv }}"
    install_operator_csv_nameprefix: "{{ ocp4_workload_aiops_operator_csv_nameprefix }}"
    install_operator_manage_namespaces:
    - "{{ _ocp4_workload_aiops_kafka_namespace }}"

- name: Run post-workload tasks
  ansible.builtin.include_tasks: post_workload.yml
