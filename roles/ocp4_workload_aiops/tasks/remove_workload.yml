---
- name: Remove Streams for Apache Kafka operator
  ansible.builtin.include_role:
    name: install_operator
  vars:
    install_operator_action: remove
    install_operator_name: "{{ ocp4_workload_aiops_operator_name }}"
    install_operator_namespace: "{{ _ocp4_workload_aiops_kafka_namespace }}"

- name: Remove AMQ Streams namespace
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: Namespace
    name: "{{ _ocp4_workload_aiops_kafka_namespace }}"

- name: Remove AIOps main namespace
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: Namespace
    name: "{{ ocp4_workload_aiops_namespace }}"
