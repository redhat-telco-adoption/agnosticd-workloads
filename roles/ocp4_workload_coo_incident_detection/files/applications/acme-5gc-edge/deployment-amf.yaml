apiVersion: apps/v1
kind: Deployment
metadata:
  name: acme-amf
  namespace: acme-5gc-edge
  labels:
    app: acme-amf
    app.kubernetes.io/name: acme-amf
    app.kubernetes.io/component: amf
    app.kubernetes.io/part-of: acme-5gc-edge-site
    demo.redhat.com/name: coo-incident-detection
    demo.redhat.com/created-by: agnosticd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: acme-amf
  template:
    metadata:
      labels:
        app: acme-amf
        app.kubernetes.io/name: acme-amf
        app.kubernetes.io/component: amf
        app.kubernetes.io/part-of: acme-5gc-edge-site
        demo.redhat.com/name: coo-incident-detection
    spec:
      containers:
        - name: acme-amf
          image: quay.io/redhat-telco-adoption/acme-5gc-edge:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            - name: ROLE
              value: "amf"
            - name: FAILURE_DELAY_SECONDS
              value: "110"
            - name: LOG_LEVEL
              value: "info"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "otel-collector.tempo.svc.cluster.local:4317"
            - name: OTEL_SERVICE_NAME
              value: "acme-amf"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.namespace=acme-5gc-edge,service.version=1.0.0"
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
