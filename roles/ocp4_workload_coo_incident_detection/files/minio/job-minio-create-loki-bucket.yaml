apiVersion: batch/v1
kind: Job
metadata:
  name: minio-create-bucket
  namespace: openshift-logging
  labels:
    demo.redhat.com/name: coo-incident-detection
    demo.redhat.com/created-by: agnosticd
spec:
  backoffLimit: 10
  template:
    metadata:
      labels:
        app: minio-bucket-creator
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: quay.io/minio/mc:latest
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for MinIO to be ready..."
              until mc alias set minio http://minio:9000 $MINIO_ROOT_USER $MINIO_ROOT_PASSWORD; do
                echo "MinIO not ready yet, retrying..."
                sleep 5
              done
              echo "Creating bucket 'loki'..."
              mc mb minio/loki --ignore-existing
              echo "Bucket created successfully!"
          env:
            - name: HOME
              value: /tmp
          envFrom:
            - secretRef:
                name: minio-credentials
