---
# Silence noisy platform alerts for the duration of the demo.
# These alerts fire by default on fresh clusters and would distract from the demo narrative.

- name: Get alertmanager pod name
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Pod
    namespace: openshift-monitoring
    label_selectors:
    - app.kubernetes.io/name=alertmanager
    - alertmanager=main
  register: r_am_pods

- name: Compute silence timestamps
  ansible.builtin.set_fact:
    _ocp4_workload_coo_incident_detection_silence_start: "{{ now(utc=True).strftime('%Y-%m-%dT%H:%M:%S.000Z') }}"
    _ocp4_workload_coo_incident_detection_silence_end: >-
      {{ '%Y-%m-%dT%H:%M:%S.000Z' | strftime(
           now(utc=True).timestamp() | int +
           (ocp4_workload_coo_incident_detection_alert_silence_duration_hours | int * 3600)
         ) }}

# k8s_exec requires command as a string (typed str, shlex-split internally).
# Passing a list causes Ansible to coerce it to "['/bin/sh', '-c', ...]" which
# breaks shlex due to unmatched single quotes in the list representation.
# The >- block scalar folds to a single line so the JSON body has no embedded
# newlines. shlex strips the shell quotes and curl receives the JSON directly.
- name: Silence noisy platform alerts in Alertmanager
  kubernetes.core.k8s_exec:
    namespace: openshift-monitoring
    pod: "{{ r_am_pods.resources[0].metadata.name }}"
    command: >-
      curl -s -o /dev/null -w "%{http_code}" -X POST
      http://localhost:9093/api/v2/silences
      -H 'Content-Type: application/json'
      -d '{"matchers": [{"name": "alertname", "value": "{{ item }}", "isRegex": false}], "startsAt": "{{ _ocp4_workload_coo_incident_detection_silence_start }}", "endsAt": "{{ _ocp4_workload_coo_incident_detection_silence_end }}", "createdBy": "agnosticd", "comment": "Demo environment silence - suppressed during COO incident detection demo"}'
  register: r_silence
  changed_when: r_silence.stdout | trim == "200"
  loop:
  - ClusterLogForwarderDeprecations
  - AlertmanagerReceiversNotConfigured
  - PodDisruptionBudgetAtLimit
  - HighOverallControlPlaneMemory
  - Watchdog
