---
# Silence noisy platform alerts for the duration of the demo.
# These alerts fire by default on fresh clusters and would distract from the demo narrative.

- name: Get Alertmanager route host
  kubernetes.core.k8s_info:
    api_version: route.openshift.io/v1
    kind: Route
    name: alertmanager-main
    namespace: openshift-monitoring
  register: r_am_route

- name: Get OpenShift authentication token
  ansible.builtin.command: oc whoami -t
  register: r_oc_token
  changed_when: false

- name: Compute silence end timestamp
  ansible.builtin.set_fact:
    _ocp4_workload_coo_incident_detection_silence_end: >-
      {{ '%Y-%m-%dT%H:%M:%S.000Z' | strftime(
           now(utc=True).timestamp() | int +
           (ocp4_workload_coo_incident_detection_alert_silence_duration_hours | int * 3600)
         ) }}

- name: Silence noisy platform alerts in Alertmanager
  ansible.builtin.uri:
    url: >-
      https://{{ r_am_route.resources[0].spec.host }}{{ r_am_route.resources[0].spec.path }}/v2/silences
    method: POST
    headers:
      Authorization: "Bearer {{ r_oc_token.stdout | trim }}"
    body_format: json
    body:
      matchers:
        - name: alertname
          value: "{{ item }}"
          isRegex: false
      startsAt: "{{ now(utc=True).strftime('%Y-%m-%dT%H:%M:%S.000Z') }}"
      endsAt: "{{ _ocp4_workload_coo_incident_detection_silence_end }}"
      createdBy: agnosticd
      comment: "Demo environment silence - suppressed during COO incident detection demo"
    validate_certs: false
    status_code:
      - 200
      - 202
  loop:
    - ClusterLogForwarderDeprecations
    - AlertmanagerReceiversNotConfigured
    - PodDisruptionBudgetAtLimit
    - HighOverallControlPlaneMemory
    - Watchdog
