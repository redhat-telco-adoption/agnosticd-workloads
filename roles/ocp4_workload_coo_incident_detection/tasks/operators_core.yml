---
# Core operators — always installed, required for the base demo.
# Operators are installed SEQUENTIALLY so OLM is not overwhelmed.
# Each operator install is followed by a CRD availability check before proceeding.

- name: Install Cluster Observability Operator
  ansible.builtin.include_role:
    name: install_operator
  vars:
    install_operator_action: install
    install_operator_name: cluster-observability-operator
    install_operator_namespace: openshift-cluster-observability-operator
    install_operator_channel: stable
    install_operator_catalog: redhat-operators
    install_operator_automatic_install_plan_approval: true
    install_operator_starting_csv: ""

- name: Label COO namespace for platform monitoring
  kubernetes.core.k8s:
    api_version: v1
    kind: Namespace
    name: openshift-cluster-observability-operator
    definition:
      metadata:
        labels:
          openshift.io/cluster-monitoring: "true"
    state: patched

- name: Wait for UIPlugin CRD to be available
  kubernetes.core.k8s_info:
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: uiplugins.observability.openshift.io
  register: r_crd_uiplugin
  retries: 30
  delay: 10
  until: r_crd_uiplugin.resources | length == 1

- name: Install Loki Operator
  ansible.builtin.include_role:
    name: install_operator
  vars:
    install_operator_action: install
    install_operator_name: loki-operator
    install_operator_namespace: openshift-operators-redhat
    install_operator_channel: "{{ ocp4_workload_coo_incident_detection_loki_channel }}"
    install_operator_catalog: redhat-operators
    install_operator_automatic_install_plan_approval: true
    install_operator_starting_csv: ""

- name: Wait for LokiStack CRD to be available
  kubernetes.core.k8s_info:
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: lokistacks.loki.grafana.com
  register: r_crd_lokistack
  retries: 30
  delay: 10
  until: r_crd_lokistack.resources | length == 1

- name: Install OpenShift Logging Operator
  ansible.builtin.include_role:
    name: install_operator
  vars:
    install_operator_action: install
    install_operator_name: cluster-logging
    install_operator_namespace: openshift-logging
    install_operator_channel: "{{ ocp4_workload_coo_incident_detection_logging_channel }}"
    install_operator_catalog: redhat-operators
    install_operator_automatic_install_plan_approval: true
    install_operator_starting_csv: ""

- name: Wait for ClusterLogForwarder CRD to be available
  kubernetes.core.k8s_info:
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: clusterlogforwarders.observability.openshift.io
  register: r_crd_clf
  retries: 30
  delay: 10
  until: r_crd_clf.resources | length == 1

- name: Install Web Terminal Operator
  ansible.builtin.include_role:
    name: install_operator
  vars:
    install_operator_action: install
    install_operator_name: web-terminal
    install_operator_namespace: openshift-operators
    install_operator_channel: fast
    install_operator_catalog: redhat-operators
    install_operator_automatic_install_plan_approval: true
    install_operator_starting_csv: ""
