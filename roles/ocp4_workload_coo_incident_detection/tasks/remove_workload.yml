---
# COO Incident Detection Demo — teardown in reverse dependency order.
# Namespace deletion cascades all namespace-scoped resources.
# openshift-operators and openshift-operators-redhat are PRE-EXISTING platform
# namespaces — they must NOT be deleted.

# User and IDP removal is handled by ocp4_workload_authentication_htpasswd teardown.

- name: Remove noc-intern RBAC
  kubernetes.core.k8s:
    state: absent
    src: "{{ role_path }}/files/demo_user/rbac-noc-intern.yaml"

- name: Remove Perses resources
  kubernetes.core.k8s:
    state: absent
    src: "{{ role_path }}/files/perses/{{ item }}"
  loop:
  - perses-dashboard.yaml
  - perses-datasource.yaml
  - perses-rbac.yaml

- name: Remove application namespaces (cascades all namespace-scoped resources)
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: Namespace
    name: "{{ item }}"
  loop:
  - incident-simulator
  - acme-5gc-edge
  - tempo
  - netobserv

- name: Remove COO UIPlugins (cluster-scoped)
  kubernetes.core.k8s:
    state: absent
    api_version: observability.openshift.io/v1alpha1
    kind: UIPlugin
    name: "{{ item }}"
  loop:
  - monitoring
  - logging
  - troubleshooting-panel
  - distributed-tracing

- name: Remove ClusterLogForwarder
  kubernetes.core.k8s:
    state: absent
    api_version: observability.openshift.io/v1
    kind: ClusterLogForwarder
    name: instance
    namespace: openshift-logging

- name: Remove ClusterLogging
  kubernetes.core.k8s:
    state: absent
    api_version: logging.openshift.io/v1
    kind: ClusterLogging
    name: instance
    namespace: openshift-logging

- name: Remove LokiStack
  kubernetes.core.k8s:
    state: absent
    api_version: loki.grafana.com/v1
    kind: LokiStack
    name: logging-loki
    namespace: openshift-logging

- name: Remove log collector RBAC
  kubernetes.core.k8s:
    state: absent
    src: "{{ role_path }}/files/loki/rbac-collector.yaml"

- name: Remove OLSConfig
  kubernetes.core.k8s:
    state: absent
    api_version: ols.openshift.io/v1alpha1
    kind: OLSConfig
    name: cluster
    namespace: openshift-lightspeed

- name: Remove LLM credentials secret
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: Secret
    name: llm-credentials
    namespace: openshift-lightspeed

- name: Remove MCP server resources
  kubernetes.core.k8s:
    state: absent
    src: "{{ role_path }}/files/mcp_server/{{ item }}"
  loop:
  - service.yaml
  - deployment.yaml
  - service-account.yaml

- name: Remove MinIO resources from openshift-logging namespace
  kubernetes.core.k8s:
    state: absent
    api_version: "{{ item.api }}"
    kind: "{{ item.kind }}"
    name: "{{ item.name }}"
    namespace: openshift-logging
  loop:
  - {api: "batch/v1", kind: "Job", name: "minio-create-bucket"}
  - {api: "batch/v1", kind: "Job", name: "minio-create-tempo-bucket"}
  - {api: "batch/v1", kind: "Job", name: "minio-create-netobserv-bucket"}
  - {api: "apps/v1", kind: "Deployment", name: "minio"}
  - {api: "v1", kind: "Service", name: "minio"}
  - {api: "v1", kind: "PersistentVolumeClaim", name: "minio-storage"}
  - {api: "v1", kind: "Secret", name: "minio-credentials"}
  - {api: "v1", kind: "Secret", name: "logging-loki-s3"}

- name: Remove Tempo reader/writer RBAC
  kubernetes.core.k8s:
    state: absent
    src: "{{ role_path }}/files/tracing/tempo-rbac.yaml"

- name: Remove NetObserv FlowCollector (cluster-scoped)
  kubernetes.core.k8s:
    state: absent
    api_version: flows.netobserv.io/v1beta2
    kind: FlowCollector
    name: cluster

# Remove operators via install_operator remove action.
# NOTE: openshift-operators and openshift-operators-redhat namespaces are
# pre-existing platform namespaces and are NOT removed.
- name: Remove core operators
  ansible.builtin.include_role:
    name: install_operator
  vars:
    install_operator_action: remove
    install_operator_name: "{{ item.name }}"
    install_operator_namespace: "{{ item.ns }}"
  loop:
  - {name: cluster-logging, ns: openshift-logging}
  - {name: loki-operator, ns: openshift-operators-redhat}
  - {name: cluster-observability-operator, ns: openshift-cluster-observability-operator}
  - {name: web-terminal, ns: openshift-operators}

- name: Remove observability operators
  ansible.builtin.include_role:
    name: install_operator
  vars:
    install_operator_action: remove
    install_operator_name: "{{ item.name }}"
    install_operator_namespace: "{{ item.ns }}"
  loop:
  - {name: lightspeed-operator, ns: openshift-lightspeed}
  - {name: tempo-product, ns: openshift-tempo-operator}
  - {name: opentelemetry-product, ns: openshift-opentelemetry-operator}
  - {name: netobserv-operator, ns: openshift-netobserv-operator}

# Remove operator namespaces created by this role.
# Do NOT include openshift-operators or openshift-operators-redhat.
- name: Remove operator namespaces created by this role
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: Namespace
    name: "{{ item }}"
  loop:
  - openshift-cluster-observability-operator
  - openshift-logging
  - openshift-lightspeed
  - openshift-tempo-operator
  - openshift-opentelemetry-operator
  - openshift-netobserv-operator
