---
# Observability operators — all required.
# Installed SEQUENTIALLY after core operators to avoid OLM resource contention.
# Each is followed by a CRD availability check before proceeding.

- name: Install OpenShift Lightspeed Operator
  ansible.builtin.include_role:
    name: install_operator
  vars:
    install_operator_action: install
    install_operator_name: lightspeed-operator
    install_operator_namespace: openshift-lightspeed
    install_operator_channel: stable
    install_operator_catalog: redhat-operators
    install_operator_automatic_install_plan_approval: true
    install_operator_starting_csv: ""
    install_operator_install_mode: OwnNamespace

- name: Wait for OLSConfig CRD to be available
  kubernetes.core.k8s_info:
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: olsconfigs.ols.openshift.io
  register: r_crd_ols
  retries: 30
  delay: 10
  until: r_crd_ols.resources | length == 1

- name: Install Tempo Operator
  ansible.builtin.include_role:
    name: install_operator
  vars:
    install_operator_action: install
    install_operator_name: tempo-product
    install_operator_namespace: openshift-tempo-operator
    install_operator_channel: stable
    install_operator_catalog: redhat-operators
    install_operator_automatic_install_plan_approval: true
    install_operator_starting_csv: ""

- name: Wait for TempoStack CRD to be available
  kubernetes.core.k8s_info:
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: tempostacks.tempo.grafana.com
  register: r_crd_tempostack
  retries: 30
  delay: 10
  until: r_crd_tempostack.resources | length == 1

- name: Install OpenTelemetry Operator
  ansible.builtin.include_role:
    name: install_operator
  vars:
    install_operator_action: install
    install_operator_name: opentelemetry-product
    install_operator_namespace: openshift-opentelemetry-operator
    install_operator_channel: stable
    install_operator_catalog: redhat-operators
    install_operator_automatic_install_plan_approval: true
    install_operator_starting_csv: ""

- name: Wait for OpenTelemetryCollector CRD to be available
  kubernetes.core.k8s_info:
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: opentelemetrycollectors.opentelemetry.io
  register: r_crd_otelcollector
  retries: 30
  delay: 10
  until: r_crd_otelcollector.resources | length == 1

- name: Install Network Observability Operator
  ansible.builtin.include_role:
    name: install_operator
  vars:
    install_operator_action: install
    install_operator_name: netobserv-operator
    install_operator_namespace: openshift-netobserv-operator
    install_operator_channel: stable
    install_operator_catalog: redhat-operators
    install_operator_automatic_install_plan_approval: true
    install_operator_starting_csv: ""

- name: Wait for FlowCollector CRD to be available
  kubernetes.core.k8s_info:
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: flowcollectors.flows.netobserv.io
  register: r_crd_flowcollector
  retries: 30
  delay: 10
  until: r_crd_flowcollector.resources | length == 1
