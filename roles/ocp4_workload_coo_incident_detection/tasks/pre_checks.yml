---
- name: Get cluster version
  kubernetes.core.k8s_info:
    api_version: config.openshift.io/v1
    kind: ClusterVersion
    name: version
  register: r_cluster_version

- name: Set cluster version fact
  ansible.builtin.set_fact:
    _ocp4_workload_coo_incident_detection_cluster_version: >-
      {{ r_cluster_version.resources[0].status.desired.version }}

- name: Display cluster version
  ansible.builtin.debug:
    msg: "OpenShift cluster version: {{ _ocp4_workload_coo_incident_detection_cluster_version }}"

- name: Warn if cluster version is below 4.20
  ansible.builtin.debug:
    msg: >-
      WARNING: OCP 4.20+ is required for full COO incident detection features.
      Found: {{ _ocp4_workload_coo_incident_detection_cluster_version }}.
      Some UIPlugin features may not be available.
  when: >-
    _ocp4_workload_coo_incident_detection_cluster_version is version('4.20', '<')

- name: Assert LLM API token is set
  ansible.builtin.assert:
    that:
    - ocp4_workload_coo_incident_detection_llm_api_token | length > 0
    fail_msg: >-
      ocp4_workload_coo_incident_detection_llm_api_token must be set.
      Provide a valid API token for the LLM provider at
      {{ ocp4_workload_coo_incident_detection_llm_api_url }}
